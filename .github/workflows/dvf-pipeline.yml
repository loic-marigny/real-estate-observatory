name: DVF Pipeline

on:
  workflow_call:
    inputs:
      mode:
        required: false
        type: string
        default: all_configured
      year:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      mode:
        description: Select whether to run every configured DVF year or a single year.
        required: true
        type: choice
        default: all_configured
        options:
          - all_configured
          - single_year
      year:
        description: Year to run when mode is single_year.
        required: false
        type: string

jobs:
  dvf-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build DVF years
        env:
          PIPELINE_MODE: ${{ inputs.mode || 'all_configured' }}
          PIPELINE_YEAR: ${{ inputs.year || '' }}
        run: |
          if [ "$PIPELINE_MODE" = "single_year" ]; then
            if [ -z "$PIPELINE_YEAR" ]; then
              echo "year is required when mode is single_year" >&2
              exit 1
            fi
            python scripts/build_dvf.py --year "$PIPELINE_YEAR"
          else
            python scripts/build_dvf.py --all-configured
          fi

      - name: Upload DVF silver artifacts to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python scripts/r2_upload.py --local data/silver/dvf --remote-prefix silver/dvf

      - name: Upload DVF gold artifacts to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python scripts/r2_upload.py --local data/gold/dvf --remote-prefix gold/dvf

      - name: Upload DVF summary JSON to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python scripts/r2_upload.py --local public/data/dvf_summary.json --remote-prefix public/data

      - name: Upload DVF preview JSON to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python scripts/r2_upload.py --local public/data/dvf_preview.json --remote-prefix public/data

      - name: Upload DVF gold artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: dvf-gold
          path: data/gold/dvf/**/*
