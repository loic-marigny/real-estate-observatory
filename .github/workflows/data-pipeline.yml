name: Data Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

jobs:
  dvf:
    uses: ./.github/workflows/dvf-pipeline.yml
    secrets: inherit

  filosofi:
    uses: ./.github/workflows/filosofi-pipeline.yml
    secrets: inherit

  commune-year:
    needs: [dvf, filosofi]
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download DVF gold artifacts
        uses: actions/download-artifact@v4
        with:
          name: dvf-gold
          path: data/gold/dvf

      - name: Download FiLoSoFi gold artifacts
        uses: actions/download-artifact@v4
        with:
          name: filosofi-gold
          path: data/gold/filosofi

      - name: Build commune-year gold artifact
        run: |
          python -m data.scripts.publishing.build_commune_year

      - name: Upload commune-year artifacts to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python -m scripts.storage.r2_upload --local data/gold/commune_year --remote-prefix gold/commune_year
