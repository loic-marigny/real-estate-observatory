name: FiLoSoFi Pipeline

on:
  workflow_call:
  workflow_dispatch:

jobs:
  filosofi-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build configured FiLoSoFi years
        run: |
          python scripts/build_filosofi.py --all-configured

      - name: Upload FiLoSoFi silver artifacts to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python scripts/r2_upload.py --local data/silver/filosofi --remote-prefix silver/filosofi

      - name: Upload FiLoSoFi gold artifacts to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python scripts/r2_upload.py --local data/gold/filosofi --remote-prefix gold/filosofi

      - name: Upload FiLoSoFi summary JSON to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python scripts/r2_upload.py --local public/data/filosofi_summary.json --remote-prefix public/data

      - name: Upload FiLoSoFi preview JSON to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python scripts/r2_upload.py --local public/data/filosofi_preview.json --remote-prefix public/data

      - name: Upload FiLoSoFi gold artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: filosofi-gold
          path: data/gold/filosofi/**/*
