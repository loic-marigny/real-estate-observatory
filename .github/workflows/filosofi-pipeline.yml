name: FiLoSoFi Pipeline

on:
  workflow_call:
  workflow_dispatch:

jobs:
  filosofi-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download FiLoSoFi raw archive
        run: |
          python data/scripts/download_filosofi.py

      - name: Build FiLoSoFi bronze layer
        run: |
          python data/scripts/build_filosofi_bronze.py

      - name: Build FiLoSoFi silver layer
        run: |
          python data/scripts/build_filosofi_silver.py

      - name: Build FiLoSoFi gold layer
        run: |
          python data/scripts/build_filosofi_gold.py

      - name: Build FiLoSoFi public preview
        run: |
          python data/scripts/build_public_previews.py --dataset filosofi

      - name: Upload FiLoSoFi commune indicators parquet to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python scripts/r2_upload.py --local data/gold/filosofi_commune_indicators.parquet --remote-prefix gold

      - name: Upload FiLoSoFi summary JSON to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python scripts/r2_upload.py --local public/data/filosofi_summary.json --remote-prefix public/data

      - name: Upload FiLoSoFi preview JSON to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python scripts/r2_upload.py --local public/data/filosofi_preview.json --remote-prefix public/data
