name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve frontend build environment
        env:
          CONFIGURED_PAGES_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
          CONFIGURED_DATA_ASSET_BASE_URL: ${{ vars.VITE_DATA_ASSET_BASE_URL }}
        run: |
          if [ -n "$CONFIGURED_PAGES_BASE_PATH" ]; then
            echo "VITE_BASE_PATH=$CONFIGURED_PAGES_BASE_PATH" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${GITHUB_REPOSITORY#*/}/" >> "$GITHUB_ENV"
          fi
          if [ -z "$CONFIGURED_DATA_ASSET_BASE_URL" ]; then
            echo "VITE_DATA_ASSET_BASE_URL must be defined in GitHub repository variables." >&2
            exit 1
          fi
          echo "VITE_DATA_ASSET_BASE_URL=$CONFIGURED_DATA_ASSET_BASE_URL" >> "$GITHUB_ENV"

      - name: Build frontend
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
